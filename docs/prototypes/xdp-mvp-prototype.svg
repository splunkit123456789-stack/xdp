      .white { fill: #ffffff; }
      .loginText { font: 700 44px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #f8fbff; }
      .loginAccent { fill: #4ed05a; }
      .inputText { font: 600 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #7a858e; }
      .kpi { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #263540; }
