    <text x="170" y="224">host=edge-01 sourcetype=syslog severity=info bytes=2048 pipeline=mvp-json-pipeline</text>
    <text x="110" y="250">index=firewall | stats count as total by action, src_ip</text>
    <text x="235" y="276">deadletter stage=json-parser error=invalid_json retryable=true</text>
