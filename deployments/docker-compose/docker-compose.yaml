services:
  mysql:
    image: mysql:8.4.1
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: xdp
      MYSQL_DATABASE: xdp
      MYSQL_USER: xdp
      MYSQL_PASSWORD: xdp
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uxdp", "-pxdp"]
      interval: 10s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    network_mode: host
    environment:
      CLICKHOUSE_USER: xdp
      CLICKHOUSE_PASSWORD: xdp
      CLICKHOUSE_DB: xdp

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    network_mode: host
    command: server /data --address ":9002" --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  redis:
    image: redis:7.4
    network_mode: host

  kafka:
    image: apache/kafka:4.0.0
    network_mode: host
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@127.0.0.1:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  xdp-api:
    build:
      context: ../..
    network_mode: host
    command: xdp-api
    environment:
      XDP_API_ADDR: :8080
      XDP_OUTPUT: clickhouse
      XDP_CLICKHOUSE_ENDPOINT: http://127.0.0.1:8123
      XDP_CLICKHOUSE_USERNAME: xdp
      XDP_CLICKHOUSE_PASSWORD: xdp
      XDP_MYSQL_DSN: xdp:xdp@tcp(127.0.0.1:3306)/xdp?parseTime=true&multiStatements=true
    depends_on:
      - mysql
      - clickhouse

  xdp-worker:
    build:
      context: ../..
    network_mode: host
    command: xdp-worker
    environment:
      XDP_KAFKA_BROKERS: 127.0.0.1:9092
      XDP_PIPELINE_CONFIG: /app/configs/pipelines
      XDP_CONFIG_API: http://127.0.0.1:8080
      XDP_CONFIG_RELOAD_INTERVAL: 2s
    depends_on:
      - kafka
      - xdp-api

  xdp-writer:
    build:
      context: ../..
    network_mode: host
    command: xdp-writer
    environment:
      XDP_WRITER_ADDR: :8082
      XDP_KAFKA_BROKERS: 127.0.0.1:9092
      XDP_CLICKHOUSE_ENDPOINT: http://127.0.0.1:8123
      XDP_CLICKHOUSE_USERNAME: xdp
      XDP_CLICKHOUSE_PASSWORD: xdp
    depends_on:
      - kafka
      - clickhouse
